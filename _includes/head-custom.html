<!-- Suporte para Mermaid Diagrams -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  
  document.addEventListener('DOMContentLoaded', function () {
    // Transforma blocos de código Jekyll (pre code.language-mermaid) em divs para o Mermaid
    const codeBlocks = document.querySelectorAll('pre code.language-mermaid');
    codeBlocks.forEach(codeBlock => {
      const parent = codeBlock.parentElement;
      const mermaidDiv = document.createElement('div');
      mermaidDiv.className = 'mermaid';
      mermaidDiv.textContent = codeBlock.textContent;
      parent.replaceWith(mermaidDiv);
    });
    // Inicializa o Mermaid após a transformação
    mermaid.initialize({ startOnLoad: true, theme: 'default' });
  });
</script>

<style>
  .mermaid {
    display: flex;
    justify-content: center;
    margin: 20px 0;
  }

  /* Estilos para o Botão de Copiar Código */
  .code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #282c34;
    color: #abb2bf;
    padding: 4px 12px;
    font-family: sans-serif;
    font-size: 0.8rem;
    border-top-left-radius: 6px;
    border-top-right-radius: 6px;
    position: relative;
    top: 5px; /* Ajuste para sobrepor levemente o bloco original se necessário */
  }

  .copy-button {
    background: transparent;
    border: 1px solid #4b5263;
    border-radius: 4px;
    color: #abb2bf;
    cursor: pointer;
    font-size: 0.75rem;
    padding: 2px 8px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .copy-button:hover {
    background: #3e4451;
    color: #fff;
  }

  .copy-button.copied {
    border-color: #98c379;
    color: #98c379;
  }

  /* Ajuste no layout do highlighter-rouge para acomodar o header */
  .highlighter-rouge {
    margin-bottom: 2em;
  }
  
  .highlighter-rouge div.highlight {
    border-bottom-left-radius: 6px;
    border-bottom-right-radius: 6px;
    margin-top: 0 !important;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const highlighterBlocks = document.querySelectorAll('div.highlighter-rouge');
    
    highlighterBlocks.forEach(block => {
      // Cria o container do cabeçalho
      const header = document.createElement('div');
      header.className = 'code-header';
      
      // Tenta identificar a linguagem a partir da classe (ex: language-python)
      let lang = 'Código';
      const codeElement = block.querySelector('code');
      if (codeElement) {
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-')) || 
                          Array.from(codeElement.classList).find(c => c.startsWith('language-'));
        if (langClass) {
          lang = langClass.replace('language-', '').toUpperCase();
        }
      }
      
      header.innerHTML = `<span>${lang}</span><button class="copy-button">Copiar</button>`;
      
      // Insere o cabeçalho antes do bloco de código
      block.insertBefore(header, block.firstChild);
      
      const button = header.querySelector('.copy-button');
      button.addEventListener('click', () => {
        const code = block.querySelector('pre').innerText;
        navigator.clipboard.writeText(code).then(() => {
          const originalText = button.textContent;
          button.textContent = 'Copiado!';
          button.classList.add('copied');
          
          setTimeout(() => {
            button.textContent = originalText;
            button.classList.remove('copied');
          }, 2000);
        });
      });
    });
  });
</script>
